# PIPELINE DEFINITION
# Name: smart-ecommerce-intelligence-pipeline
# Description: Kubeflow pipeline DAG definition.
components:
  comp-features-op:
    executorLabel: exec-features-op
  comp-preprocess-op:
    executorLabel: exec-preprocess-op
  comp-score-op:
    executorLabel: exec-score-op
  comp-train-classifier-op:
    executorLabel: exec-train-classifier-op
deploymentSpec:
  executors:
    exec-features-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - features_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef features_op():\n    \"\"\"Run feature engineering step (from\
          \ cleaned to features parquet).\"\"\"\n    from src.features.build_features\
          \ import run\n\n    run()\n\n"
        image: python:3.11
    exec-preprocess-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - preprocess_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef preprocess_op():\n    \"\"\"Run preprocessing step (from raw\
          \ JSON to cleaned parquet).\"\"\"\n    from src.preprocessing.run import\
          \ run\n\n    run()\n\n"
        image: python:3.11
    exec-score-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - score_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef score_op():\n    \"\"\"Run Top-K scoring and export analytics\
          \ CSVs.\"\"\"\n    from src.scoring.topk import run\n\n    run()\n\n"
        image: python:3.11
    exec-train-classifier-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_classifier_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_classifier_op():\n    \"\"\"Train RandomForest classifier\
          \ and export metrics.\"\"\"\n    from src.ml.train_classifier import run\n\
          \n    run()\n\n"
        image: python:3.11
pipelineInfo:
  description: Kubeflow pipeline DAG definition.
  name: smart-ecommerce-intelligence-pipeline
root:
  dag:
    tasks:
      features-op:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-features-op
        dependentTasks:
        - preprocess-op
        taskInfo:
          name: features-op
      preprocess-op:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-preprocess-op
        taskInfo:
          name: preprocess-op
      score-op:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-score-op
        dependentTasks:
        - features-op
        taskInfo:
          name: score-op
      train-classifier-op:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-classifier-op
        dependentTasks:
        - score-op
        taskInfo:
          name: train-classifier-op
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
